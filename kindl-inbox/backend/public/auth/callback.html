<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindl Inbox — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #202124;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 44px 36px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo { font-size: 26px; font-weight: 800; color: #6366f1; margin-bottom: 6px; }
    .title { font-size: 18px; font-weight: 600; color: #202124; margin-bottom: 8px; }
    .desc  { font-size: 14px; color: #5f6368; line-height: 1.6; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e8eaed;
      border-top: 3px solid #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 18px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-success { font-size: 40px; margin: 12px 0; }
    .icon-error   { font-size: 40px; margin: 12px 0; }
    .error-text   { color: #c5221f; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Kindl Inbox</div>
    <div id="content">
      <div class="spinner"></div>
      <div class="title">Completing sign-in…</div>
      <div class="desc">Please wait a moment.</div>
    </div>
  </div>

  <script type="module">
    // This relay page is the emailRedirectTo target for Supabase magic links.
    // It reads the auth tokens from the URL, posts them to our backend keyed
    // by the `state` param, then shows a "close this tab" message.
    // The extension popup polls GET /api/auth/pending?state=xxx to pick them up.

    const API_BASE = window.location.origin

    async function run() {
      const search = new URLSearchParams(window.location.search)
      const hash   = new URLSearchParams(window.location.hash.replace(/^#/, ''))

      const state         = search.get('state')
      const access_token  = hash.get('access_token')  ?? search.get('access_token')
      const refresh_token = hash.get('refresh_token') ?? search.get('refresh_token')
      const error_desc    = search.get('error_description') ?? hash.get('error_description')

      if (error_desc) {
        showError(decodeURIComponent(error_desc))
        return
      }

      if (!access_token) {
        showError('No authentication token found. Please try signing in again from the extension.')
        return
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ state, access_token, refresh_token }),
        })
        if (!res.ok) throw new Error(`Server responded ${res.status}`)
        showSuccess()
      } catch (err) {
        showError(err.message || 'Could not complete sign-in. Please try again.')
      }
    }

    function showSuccess() {
      document.getElementById('content').innerHTML = `
        <div class="icon-success">✅</div>
        <div class="title">You're signed in!</div>
        <div class="desc">
          Return to Gmail — the Kindl Inbox sidebar is ready to use.
          You can close this tab.
        </div>
      `
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="icon-error">⚠️</div>
        <div class="title">Sign-in failed</div>
        <div class="error-text">${msg}</div>
        <div class="desc" style="margin-top:12px">
          Please close this tab and try again from the Kindl Inbox extension.
        </div>
      `
    }

    run()
  </script>
</body>
</html>
